name: security

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Required for checkout or repository metadata reads.

jobs:
  pinact:
    name: pinact
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for checkout or repository metadata reads.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: "true" # validate only; fail CI on unpinned actions

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      actions: read # required by upload-sarif to read workflow run metadata
      contents: read # Required for checkout or repository metadata reads.
      security-events: write # upload SARIF to Code Scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: pedantic

  socket-security:
    name: socket-security
    # Skip on fork and Dependabot PRs because GitHub doesn't expose repo/environment
    # secrets to them, and the scan requires `SOCKET_SECURITY_API_KEY`.
    # Always runs for `merge_group` where secrets are available.
    if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    environment: socket-security
    permissions:
      issues: write # Socket CLI may open or update issues for new alerts.
      contents: read # Required for checkout or repository metadata reads.
      pull-requests: write # Socket CLI posts scan results as PR comments.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # For PRs, fetch one additional commit for proper diff analysis.
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install socketsecurity==2.2.86 --upgrade

      - name: Run Socket Security scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_INPUT: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER=0
          if [ "${EVENT_NAME}" == "pull_request" ]; then
            PR_NUMBER="${PR_NUMBER_INPUT}"
          fi
          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"

  security:
    name: security
    permissions: {}
    if: always()
    needs:
      - pinact
      - socket-security
      - zizmor
    runs-on: ubuntu-latest
    steps:
      - name: Print all job results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "'needs': ${NEEDS_JSON}"
          echo "github.event_name: ${GITHUB_EVENT_NAME}"

      # In the merge queue, any skipped job is a failure (everything must run).
      # In PR CI, skips are allowed (e.g. fork PRs without OIDC).
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || (github.event_name == 'merge_group' && contains(needs.*.result, 'skipped')) }}
        run: exit 1
